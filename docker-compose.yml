version: '3.8'

services:
  backend:
    build: ./backend
    container_name: markdownit_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: markdownit_ui
    ports:
      - "8080:8080"
    depends_on:
      - backend

  redis:
    image: redis:6.2-alpine
    container_name: markdownit_redis
    ports:
      - "6379:6379"
